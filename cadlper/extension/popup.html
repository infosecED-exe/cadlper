<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DLP Agent</title>
  <style>
    body {
      margin: 0;
      padding: 16px;
      width: 280px;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .card {
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
      background: #111827;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .row {
      margin: 8px 0;
      font-size: 13px;
      line-height: 1.4;
    }

    .label {
      color: #94a3b8;
    }

    .status {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #052e16;
      color: #86efac;
      border: 1px solid #166534;
    }

    .muted {
      margin-top: 12px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">DLP Agent</div>

    <div class="row">
      <span class="label">Status:</span>
      <span class="status">Active</span>
    </div>

    <div class="row">
      <span class="label">Monitoring:</span>
      Browser events enabled
    </div>

    <div class="row">
      <span class="label">Behavior:</span>
      View only, no user action
    </div>

    <div class="row">
      <span class="label">Version:</span>
      1.0.0
    </div>

    <div class="muted">
      This panel is informational only.
    </div>
  </div>
</body>
</html>
